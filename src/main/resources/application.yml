server:
  port: 9090
  address: 0.0.0.0

spring:
  application:
    name: context-bridge

  # ── Spring AI — Ollama (embeddings) ───────────────────────────────────────
  ai:
    ollama:
      base-url: ${OLLAMA_HOST:http://localhost:11434}
      # Embedding model — change OLLAMA_EMBED_MODEL env var to swap model
      embedding:
        model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
        options:
          num-ctx: 2048
      # Optional: chat model for future LLM calls (uncomment when needed)
      # chat:
      #   model: ${OLLAMA_CHAT_MODEL:llama3.2}

    # ── Chroma DB vector store ────────────────────────────────────────────────
    vectorstore:
      chroma:
        host: ${CHROMA_HOST:localhost}
        port: ${CHROMA_PORT:8000}
        collection-name: contextsnapshots

# ── Actuator health endpoint ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.contextbridge: DEBUG
    org.springframework.ai: INFO
