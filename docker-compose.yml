services:

  # ── Vector Database ──
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: chroma-db
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/version" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chroma-data:
    driver: local
